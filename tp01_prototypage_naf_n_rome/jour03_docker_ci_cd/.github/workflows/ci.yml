# ============================================================
# CI/CD Pipeline -- NAF-ROME API
# TP 1.2 -- GitHub Actions
# ============================================================
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'jour03_docker_ci_cd/**'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/naf-rome-api

jobs:
  # ============================================================
  # Job 1 : Lint & Format
  # ============================================================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jour03_docker_ci_cd

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff==0.7.0

      - name: Run Ruff (lint)
        run: ruff check app/ tests/

      - name: Run Ruff (format check)
        run: ruff format --check app/ tests/

  # ============================================================
  # Job 2 : Tests
  # ============================================================
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: jour03_docker_ci_cd

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: jour03_docker_ci_cd/coverage.xml
          fail_ci_if_error: false

  # ============================================================
  # Job 3 : Build Docker
  # ============================================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: jour03_docker_ci_cd

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: jour03_docker_ci_cd
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
